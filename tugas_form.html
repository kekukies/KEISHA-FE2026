<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Form Pendaftaran Bimbel Mandiri Berprestasi Unggul Digital</title>
</head>
<body>
<br>
<h2 style="text-align: center;">Form Pendaftaran Bimbel Mandiri Berprestasi Unggul Digital</h2>
<hr>

<form action="prosess-form.php" method="POST">

    <label>Nama Lengkap:</label><br>
    <input type="text" name="nama" placeholder="Nama lengkap" required><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" placeholder="email@example.com" required><br><br>

    <label>Password:</label><br>
    <input type="password" name="password" required><br><br>

    <label>Jenis Kelamin:</label><br>
    <input type="radio" name="jk" value="Pria"> Pria
    <input type="radio" name="jk" value="Wanita"> Wanita
    <input type="radio" name="jk" value="Rahasia"> Rahasia 😜 <br><br>

    <label>Hobi:</label><br>
    <input type="checkbox" name="hobi[]" value="Sak Masak Nasi"> Sak Masak Nasi
    <input type="checkbox" name="hobi[]" value="Mancing di Roblox"> Mancing di Roblox
    <input type="checkbox" name="hobi[]" value="Membaca AU"> Membaca AU <br><br>

    <label>Tanggal Lahir:</label><br>
    <input type="date" name="tanggal_lahir"><br><br>

    <label>Asal Kota:</label><br>
    <select name="kota">
        <option value="">-- Pilih Kota --</option>
        <option value="New York">New York</option>
        <option value="London">London</option>
        <option value="Paris">Paris</option>
        <option value="Seoul">Seoul</option>
        <option value="San Francisco">San Francisco</option>
    </select><br><br>

    <label>Komentar:</label><br>
    <textarea name="komentar" rows="4" cols="40" placeholder="Tulis komentar..."></textarea><br><br>

    <label>Upload File:</label><br>
    <input type="file" name="file"><br><br>

    <input type="submit" value="Kirim">
    <input type="reset" value="Reset">

</form>

</body>
</html>
